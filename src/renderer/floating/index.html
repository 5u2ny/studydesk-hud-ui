<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyDesk</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { background: transparent; user-select: none; }
    </style>
  </head>
  <body>
    <!-- Liquid glass displacement filter — referenced by .hud { filter: url(#hud-liquid-glass) } -->
    <svg width="0" height="0" style="position:absolute;overflow:hidden">
      <defs>
        <filter id="hud-liquid-glass" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
          <!-- Subtle displacement for glass refraction effect -->
          <feTurbulence type="fractalNoise" baseFrequency="0.65 0.85" numOctaves="2" seed="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
          <!-- Chromatic aberration via tiny channel splits -->
          <feColorMatrix in="displaced" type="matrix"
            values="1 0 0 0 0.003
                    0 1 0 0 0
                    0 0 1 0 -0.003
                    0 0 0 1 0" result="aberrated"/>
          <feBlend in="SourceGraphic" in2="aberrated" mode="screen" result="blended"/>
          <feComposite in="blended" in2="SourceGraphic" operator="in"/>
        </filter>
        <!-- Glow filter for the arc -->
        <filter id="arc-glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
